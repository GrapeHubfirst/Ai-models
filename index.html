<style>
/* Aurora v2 — Inline response rendering */

/* Non-code responses: render inline, not in preview pane placeholder */
.prose-area {
  width: 100%;
  max-width: 100%;
}

/* __HTML__ widget content should render inline in chat */
.aurora-inline-widget {
  width: 100%;
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 12px;
  border: 1px solid var(--bdr2);
  background: var(--sur);
}

.aurora-inline-widget iframe {
  width: 100%;
  min-height: 320px;
  border: 0;
  display: block;
}

/* The widget placeholder text styling */
.md-muted {
  color: var(--t4) !important;
  font-size: 13px;
  font-style: italic;
}

/* Ensure perplexity weather cards and rich content display inline */
[class*="WeatherCard"],
[class*="weather-card"],
[class*="AnswerBody"],
[id^="markdown-content"] {
  display: block !important;
  max-width: 100% !important;
  overflow: hidden !important;
}

/* Hide the aurora://widget text in the URL bar when not in code mode */
.aurora-root aside + main > .flex.min-h-0 > aside:not(.lg\:flex) {
  display: none !important;
}

/* Download section - only show for code files */
/* (handled by JS logic in the bundle already) */
</style>
</head>
  <body>
    <div id="root"></div>
  
<script>
// ── Aurora v3 Patch ──────────────────────────────────────────────────────────
// Fixes:
//  1. X button on the LEFT EDGE (panel toggle), not inside preview
//  2. Side panel only for coding/HTML — NOT for chat/text responses
//  3. Rich UI responses (weather, bitcoin, charts) render inline as HTML
//  4. Memory improvements — auto-save per conversation
//  5. Arena battle mode injected as option
//  6. Perplexity routing fix

(function() {
  'use strict';

  // ── SIDE PANEL CONTROL ─────────────────────────────────────────────────
  // The preview aside should ONLY show when the response has actual HTML/code
  // For text-only responses it stays hidden
  
  let panelVisible = false;

  function updatePanelVisibility() {
    // Find the right-side preview panel
    const preview = findPreviewPanel();
    if (!preview) return;

    // Check if there's actual HTML/code content to show
    const iframe = preview.querySelector('iframe');
    const hasContent = iframe && (iframe.srcdoc || iframe.src);
    
    // If no actual preview content, force hide the panel
    if (!hasContent && !panelVisible) {
      preview.style.display = 'none';
    }
    
    // Add the left-edge close toggle if not already there
    addPanelToggleButton(preview);
  }

  function findPreviewPanel() {
    // The preview panel is an <aside> that contains the browser-chrome toolbar
    const asides = document.querySelectorAll('aside');
    for (const a of asides) {
      // The preview aside has the download button and the "aurora://preview" URL bar
      if (a.querySelector('iframe') || 
          (a.textContent && a.textContent.includes('Download') && a.querySelector('div[style]'))) {
        return a;
      }
    }
    return null;
  }

  function addPanelToggleButton(panel) {
    if (panel.dataset.toggleAdded) return;
    panel.dataset.toggleAdded = 'true';

    // Create the left-edge close button (appears on the LEFT border of the panel)
    const toggleBtn = document.createElement('button');
    toggleBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>`;
    toggleBtn.title = 'Close preview panel';
    toggleBtn.style.cssText = `
      position:absolute; left:-16px; top:50%; transform:translateY(-50%);
      z-index:200; width:16px; height:48px; border-radius:8px 0 0 8px;
      border:1px solid var(--bdr2); border-right:none;
      background:var(--bg3); color:var(--t4); 
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all .15s; opacity:0.6;
    `;
    toggleBtn.addEventListener('mouseenter', () => { toggleBtn.style.opacity = '1'; toggleBtn.style.color = 'var(--t2)'; });
    toggleBtn.addEventListener('mouseleave', () => { toggleBtn.style.opacity = '0.6'; toggleBtn.style.color = 'var(--t4)'; });
    toggleBtn.addEventListener('click', () => {
      panel.style.display = 'none';
      panelVisible = false;
      // Show a small restore chip in the chat area
      showRestoreChip();
    });

    panel.style.position = 'relative';
    panel.appendChild(toggleBtn);
  }

  function showRestoreChip() {
    // Remove old chip if present
    document.getElementById('_aurora_restore_chip')?.remove();
    const chip = document.createElement('button');
    chip.id = '_aurora_restore_chip';
    chip.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="3" width="11" height="18" rx="2"/><path d="M5 3h4v18H5z"/></svg> Show preview`;
    chip.style.cssText = `
      position:fixed; bottom:80px; right:16px; z-index:300;
      display:flex; align-items:center; gap:8px;
      padding:8px 16px; border-radius:20px; cursor:pointer;
      border:1px solid var(--bdr2); background:var(--sur);
      color:var(--t2); font-size:13px; font-family:inherit;
      box-shadow:0 4px 20px rgba(0,0,0,.3);
      transition:opacity .15s;
    `;
    chip.addEventListener('click', () => {
      const panel = findPreviewPanel();
      if (panel) { panel.style.display = ''; panelVisible = true; }
      chip.remove();
    });
    document.body.appendChild(chip);
    // Auto-hide after 5 seconds
    setTimeout(() => chip.remove(), 5000);
  }

  // ── INLINE HTML WIDGET RENDERING ────────────────────────────────────────
  // When a response is NOT code/HTML, it should render nicely inline
  // When it IS an HTML widget (weather, bitcoin, chart), render it inline in the chat
  
  function renderInlineWidgets() {
    // Find any .prose-area divs
    document.querySelectorAll('.prose-area').forEach(area => {
      if (area.dataset.widgetProcessed) return;
      
      // Look for Perplexity/rich HTML content that got embedded
      const richContent = area.querySelector('[id^="markdown-content"], [class*="AnswerBody"], [class*="WeatherCard"]');
      if (richContent) {
        area.dataset.widgetProcessed = 'true';
        // Wrap in an inline widget card
        richContent.style.cssText = 'display:block; max-width:100%; overflow:auto; border-radius:12px; padding:16px; background:var(--sur); border:1px solid var(--bdr2);';
      }
      
      // If the area has an inline iframe (from Vm component), ensure it's sized properly
      const inlineIframe = area.querySelector('iframe');
      if (inlineIframe && !area.dataset.iframeStyled) {
        area.dataset.iframeStyled = 'true';
        inlineIframe.style.minHeight = '320px';
        inlineIframe.style.borderRadius = '12px';
      }
    });
  }

  // ── PERPLEXITY URL FIX ───────────────────────────────────────────────────
  // The ai_proxy.py already handles this, just ensure the UI sends correctly
  // No change needed here — it routes via run.py correctly

  // ── ARENA BATTLE INJECTION ───────────────────────────────────────────────
  function injectArenaBattle() {
    // Find model picker dropdowns rendered by Aurora
    document.querySelectorAll('[class*="Lf"] button, [class*="dropdown"] button').forEach(btn => {
      if (!btn.textContent) return;
      if (btn.textContent.includes('arena-mystery') && !btn.dataset.battleSibling) {
        btn.dataset.battleSibling = 'true';
        const parent = btn.parentNode;
        if (!parent || parent.dataset.battleInjected) return;
        parent.dataset.battleInjected = 'true';
        
        const battleBtn = btn.cloneNode(true);
        // Update text content in the spans
        const spans = battleBtn.querySelectorAll('span span');
        if (spans.length >= 2) {
          spans[0].textContent = 'battle-mode (no login)';
          spans[1].textContent = 'Battle';
        } else {
          battleBtn.textContent = 'Arena Battle (no login)';
        }
        battleBtn.style.borderLeft = '2px solid #F59E0B';
        battleBtn.removeAttribute('data-battle-sibling');
        
        // Override click to set arena_battle
        battleBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          // Store preferred model in settings
          try {
            const s = JSON.parse(localStorage.getItem('aurora_settings_v1') || '{}');
            s._pendingModel = 'arena_battle';
            localStorage.setItem('aurora_settings_v1', JSON.stringify(s));
          } catch(err) {}
        });
        
        parent.insertBefore(battleBtn, btn.nextSibling);
      }
    });
  }

  // ── MEMORY: Auto-save conversation summaries ─────────────────────────────
  let lastSavedMsgCounts = {};
  
  function autoSaveMemory() {
    try {
      const convs = JSON.parse(localStorage.getItem('aurora_conversations_v1') || '[]');
      const settings = JSON.parse(localStorage.getItem('aurora_settings_v1') || '{}');
      const relayUrl = settings.relayUrl || 'http://localhost:8765';
      
      convs.slice(0, 10).forEach(conv => {
        const msgs = conv.messages || [];
        const lastMsg = msgs[msgs.length - 1];
        if (!lastMsg || lastMsg.status === 'loading') return;
        if (lastSavedMsgCounts[conv.id] === msgs.length) return;
        lastSavedMsgCounts[conv.id] = msgs.length;
        
        if (msgs.length < 2) return;
        
        const userTexts = msgs.filter(m => m.role === 'user').map(m => (m.text||'').slice(0, 80)).join('; ');
        const lastText = (lastMsg.text || '').slice(0, 120);
        const summary = `Project "${conv.title}": User: ${userTexts}. Result: ${lastText}`;
        
        fetch(relayUrl + '/memory/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: `chat_${conv.id}`, value: summary })
        }).catch(() => {});
      });
    } catch(e) {}
  }

  // ── MAIN LOOP ────────────────────────────────────────────────────────────
  let loopTimer = null;
  const observer = new MutationObserver(() => {
    if (loopTimer) clearTimeout(loopTimer);
    loopTimer = setTimeout(() => {
      updatePanelVisibility();
      renderInlineWidgets();
      injectArenaBattle();
    }, 200);
  });

  function init() {
    const root = document.getElementById('root');
    if (!root || !root.children.length) { setTimeout(init, 300); return; }
    observer.observe(root, { childList: true, subtree: true });
    
    // Memory auto-save every 12 seconds
    setInterval(autoSaveMemory, 12000);
    
    // Initial pass
    setTimeout(() => {
      updatePanelVisibility();
      injectArenaBattle();
    }, 800);
    
    console.log('[Aurora v3 Patch] Panel toggle, inline widgets, memory, arena battle active.');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    setTimeout(init, 400);
  }

  // Public API
  window._auroraShowWidget = () => {
    const p = findPreviewPanel();
    if (p) { p.style.display = ''; panelVisible = true; }
    document.getElementById('_aurora_restore_chip')?.remove();
  };
  window._auroraHideWidget = () => {
    const p = findPreviewPanel();
    if (p) { p.style.display = 'none'; panelVisible = false; }
  };
  window._auroraUpgrade = async function(target, prompt, model) {
    model = model || 'gemini';
    const s = JSON.parse(localStorage.getItem('aurora_settings_v1') || '{}');
    const relayUrl = s.relayUrl || 'http://localhost:8765';
    const res = await fetch(relayUrl + '/upgrade', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ target, prompt, model })
    });
    return await res.json();
  };

})();

// ── OLD v2 Patch (kept for compat, noop) ──────────────────────────────────
(function() {
  // Wait for React app to mount
  let patchAttempts = 0;
  function tryPatch() {
    patchAttempts++;
    if (patchAttempts > 50) return;
    
    // Watch for new response containers and apply inline styling
    const observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(mut) {
        mut.addedNodes.forEach(function(node) {
          if (node.nodeType !== 1) return;
          
          // Find prose-area elements that contain non-HTML responses
          const proseAreas = node.querySelectorAll ? 
            node.querySelectorAll('.prose-area') : [];
          proseAreas.forEach(applyInlineStyle);
          
          if (node.classList && node.classList.contains('prose-area')) {
            applyInlineStyle(node);
          }
          
          // Find and style weather widgets and rich HTML content
          const widgets = node.querySelectorAll ? 
            node.querySelectorAll('[class*="WeatherCard"],[class*="weather"],[class*="AnswerBody"],[id^="markdown-content"]') : [];
          widgets.forEach(function(w) {
            w.style.display = 'block';
            w.style.maxWidth = '100%';
            w.style.overflow = 'hidden';
          });
        });
      });
    });
    
    const root = document.getElementById('root');
    if (!root || !root.children.length) {
      setTimeout(tryPatch, 200);
      return;
    }
    
    observer.observe(root, { childList: true, subtree: true });
    
    // Initial pass
    root.querySelectorAll('.prose-area').forEach(applyInlineStyle);
  }
  
  function applyInlineStyle(el) {
    if (!el) return;
    // Check if this contains a widget iframe or code blocks only
    const hasIframe = el.querySelector('iframe');
    const hasWidget = el.querySelector('[class*="WeatherCard"],[class*="weather-card"]');
    const hasCodeOnly = el.querySelector('.code-block-wrap') && !el.querySelector('p');
    
    // If it's just a widget placeholder text, hide it
    const text = el.textContent || '';
    if (text.trim() === 'Widget rendered in preview pane →' || 
        text.trim() === 'Widget rendered in preview pane') {
      // This is shown when there's HTML - keep but style nicely
      el.style.color = 'var(--t4)';
      el.style.fontSize = '13px';
      el.style.fontStyle = 'italic';
    }
  }

  setTimeout(tryPatch, 500);
  
  // ── Upgrade Panel ────────────────────────────────────────────────────────
  // Inject upgrade button into Settings when it opens
  function injectUpgradePanel() {
    // Look for settings modal
    const modals = document.querySelectorAll('[class*="modal"],[class*="Modal"]');
    // Use MutationObserver on body to catch settings opening
  }
  
  // Override console to catch upgrade trigger
  window._auroraUpgrade = async function(target, prompt, model) {
    model = model || 'gemini';
    const relayUrl = (function() {
      try {
        const s = JSON.parse(localStorage.getItem('aurora_settings_v1') || '{}');
        return s.relayUrl || 'http://localhost:8765';
      } catch(e) { return 'http://localhost:8765'; }
    })();
    
    const res = await fetch(relayUrl + '/upgrade', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ target, prompt, model })
    });
    return await res.json();
  };
  
  console.log('[Aurora v2] Patch loaded. Use window._auroraUpgrade(target, prompt) to self-upgrade.');
})();
</script>

<script>
// ── Aurora Improvements Patch ──────────────────────────────────────────────
// Fixes: 1) Widget dismiss/restore  2) Better memory  3) Arena Battle model

(function() {
  'use strict';

  // ── 1. WIDGET DISMISS + RESTORE ──────────────────────────────────────────
  // Hide the preview pane and track state
  let widgetHidden = false;
  
  function addDismissButton() {
    // Find the preview aside panel
    const asides = document.querySelectorAll('aside');
    const previewAside = Array.from(asides).find(a => 
      a.querySelector('iframe') || a.querySelector('[class*="preview"]') ||
      (a.style && a.style.borderColor !== '' && a.querySelector('div'))
    );
    if (!previewAside || previewAside.dataset.dismissAdded) return;
    previewAside.dataset.dismissAdded = 'true';

    // Find the header bar inside the aside (should have the browser URL bar)
    const header = previewAside.querySelector('div[style*="background"]');
    if (!header) return;

    // Create X button
    const xBtn = document.createElement('button');
    xBtn.innerHTML = '&times;';
    xBtn.title = 'Hide preview panel';
    xBtn.style.cssText = `
      position:absolute; top:6px; right:8px; z-index:100;
      width:28px; height:28px; border-radius:8px; border:1px solid var(--bdr2);
      background:var(--bg3); color:var(--t3); font-size:18px; line-height:1;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:opacity .15s; opacity:0.7;
    `;
    xBtn.addEventListener('mouseenter', () => xBtn.style.opacity = '1');
    xBtn.addEventListener('mouseleave', () => xBtn.style.opacity = '0.7');
    xBtn.addEventListener('click', () => {
      widgetHidden = true;
      previewAside.style.display = 'none';
      previewAside.dataset.hidden = 'true';
      showRestoreHint();
    });

    // Make the aside relatively positioned for the absolute X button
    previewAside.style.position = 'relative';
    previewAside.appendChild(xBtn);
  }

  function showRestoreHint() {
    // Find download section or file row at the bottom of a message
    const downloadSections = document.querySelectorAll('[class*="Downloads"],[class*="download"]');
    downloadSections.forEach(el => {
      if (el.dataset.restoreAdded) return;
      el.dataset.restoreAdded = 'true';
      el.style.cursor = 'pointer';
      el.title = 'Click to show preview panel';
      el.addEventListener('click', () => {
        const hidden = document.querySelector('[data-hidden="true"]');
        if (hidden) {
          hidden.style.display = '';
          hidden.dataset.hidden = 'false';
          widgetHidden = false;
        }
      });
    });
  }

  // Also: clicking the "Preview" tab label or the inline iframe area restores
  function addRestoreOnPreviewClick() {
    document.querySelectorAll('button').forEach(btn => {
      const text = btn.textContent.trim();
      if ((text === 'Preview' || text === 'Code') && !btn.dataset.restoreClick) {
        btn.dataset.restoreClick = 'true';
        btn.addEventListener('click', () => {
          const hidden = document.querySelector('[data-hidden="true"]');
          if (hidden) {
            hidden.style.display = '';
            hidden.dataset.hidden = 'false';
            widgetHidden = false;
          }
        });
      }
    });
  }

  // ── 2. MEMORY: Auto-save conversation titles/summaries ────────────────────
  const MEMORY_KEY = 'aurora_auto_memories';
  
  function autoSaveMemory(title, summary) {
    try {
      const settings = JSON.parse(localStorage.getItem('aurora_settings_v1') || '{}');
      const relayUrl = settings.relayUrl || 'http://localhost:8765';
      // Save as a memory entry via the relay
      fetch(relayUrl + '/memory/add', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ key: 'recent_project', value: summary.slice(0, 200) })
      }).catch(() => {});
      
      // Also keep a local log
      const log = JSON.parse(localStorage.getItem(MEMORY_KEY) || '[]');
      log.unshift({ title, summary: summary.slice(0, 200), ts: Date.now() });
      localStorage.setItem(MEMORY_KEY, JSON.stringify(log.slice(0, 20)));
    } catch(e) {}
  }

  // Watch for completed conversations and auto-save to memory
  function watchForCompletedChats() {
    const convKey = 'aurora_conversations_v1';
    let lastChecked = {};
    
    setInterval(() => {
      try {
        const convs = JSON.parse(localStorage.getItem(convKey) || '[]');
        convs.forEach(conv => {
          const msgs = conv.messages || [];
          const lastMsg = msgs[msgs.length - 1];
          if (!lastMsg || lastMsg.role !== 'assistant' || lastMsg.status === 'loading') return;
          if (lastChecked[conv.id] === msgs.length) return;
          lastChecked[conv.id] = msgs.length;
          
          // Build a summary for memory
          const userMessages = msgs.filter(m => m.role === 'user').map(m => m.text || '').join(' | ');
          const assistantSnippet = (lastMsg.text || '').slice(0, 150);
          const summary = `[${conv.title}] User asked: ${userMessages.slice(0, 100)}. Last response: ${assistantSnippet}`;
          
          if (msgs.length >= 2) {
            autoSaveMemory(conv.title, summary);
          }
        });
      } catch(e) {}
    }, 8000);
  }

  // ── 3. ARENA BATTLE MODEL UI injection ───────────────────────────────────
  // Inject "Battle Mode" into model dropdowns that contain "arena"
  function injectArenaBattle() {
    const options = document.querySelectorAll('select option, button[data-model]');
    options.forEach(opt => {
      if (opt.textContent && opt.textContent.includes('arena-mystery') && !opt.parentElement.dataset.battleAdded) {
        opt.parentElement.dataset.battleAdded = 'true';
        const newOpt = opt.cloneNode(true);
        newOpt.value = 'arena_battle';
        newOpt.textContent = 'Arena Battle Mode (no login)';
        opt.parentElement.insertBefore(newOpt, opt.nextSibling);
      }
    });
  }

  // ── 4. PATCH WORDING in UI: "Arena" → show battle option ─────────────────
  // When model picker opens, intercept and add battle mode entry
  function patchModelPicker() {
    // Look for the dropdown items that mention arena
    document.querySelectorAll('[class*="dropdown"] button, [class*="menu"] button, [class*="Lf"] button').forEach(btn => {
      const text = btn.textContent || '';
      if (text.includes('arena-mystery') && !btn.dataset.battlePatched) {
        btn.dataset.battlePatched = 'true';
        const parent = btn.closest('div[class]');
        if (!parent || parent.dataset.battleEntryAdded) return;
        parent.dataset.battleEntryAdded = 'true';
        
        const battleBtn = btn.cloneNode(true);
        const spans = battleBtn.querySelectorAll('span');
        if (spans.length >= 2) {
          spans[0].textContent = 'arena_battle';
          spans[1].textContent = 'Battle (no login)';
        }
        battleBtn.style.cssText += 'border-left: 2px solid #F59E0B; margin-top: 4px;';
        battleBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          // Dispatch model change
          window._auroraSetModel && window._auroraSetModel('arena_battle');
          // Try to trigger via React internals (find and call onChange)
          const inputs = document.querySelectorAll('input[type="hidden"]');
          inputs.forEach(inp => { if (inp.value === 'arena') inp.value = 'arena_battle'; });
        });
        parent.appendChild(battleBtn);
      }
    });
  }

  // ── MUTATION OBSERVER: run all patches on DOM changes ─────────────────────
  let patchTimer = null;
  const observer = new MutationObserver(() => {
    if (patchTimer) clearTimeout(patchTimer);
    patchTimer = setTimeout(() => {
      addDismissButton();
      addRestoreOnPreviewClick();
      injectArenaBattle();
      patchModelPicker();
    }, 300);
  });

  function init() {
    const root = document.getElementById('root');
    if (!root || !root.children.length) {
      setTimeout(init, 300);
      return;
    }
    observer.observe(root, { childList: true, subtree: true });
    watchForCompletedChats();
    // Initial passes
    setTimeout(() => {
      addDismissButton();
      injectArenaBattle();
    }, 1000);
    
    console.log('[Aurora Patch] Widget dismiss, memory, and arena battle mode active.');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    setTimeout(init, 500);
  }

  // Expose for debugging
  window._auroraHideWidget = function() {
    const asides = document.querySelectorAll('aside');
    asides.forEach(a => { if (a.querySelector('iframe')) { a.style.display = 'none'; a.dataset.hidden = 'true'; }});
  };
  window._auroraShowWidget = function() {
    document.querySelectorAll('[data-hidden="true"]').forEach(el => {
      el.style.display = '';
      el.dataset.hidden = 'false';
    });
  };

})();
</script>

</body>
</html>
